services:
  mysql:
    image: mysql:8.0
    container_name: api-monitor-db
    environment:
      MYSQL_DATABASE: api_monitoring
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: api-monitor-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: api_monitoring
      DB_USER: root
      DB_PASSWORD: root
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: api-monitor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysqldata:
